services:
  - type: web
    name: analytics-back
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: analytics-db
          property: connectionString

databases:
  - name: analytics-db
    plan: free