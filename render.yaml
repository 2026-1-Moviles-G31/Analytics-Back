services:
  - type: web
    name: analytics-back
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: analytics-db
          property: connectionString
      - key: BIGQUERY_PROJECT_ID
        sync: false
      - key: BIGQUERY_DATASET
        sync: false
      - key: BIGQUERY_TUTOR_EVENTS_TABLE
        sync: false

databases:
  - name: analytics-db
    plan: free
